<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ACE Foundation</title>
  <style>
    body {
      background: #000;
      color: #d0d0d0;
      font-family: sans-serif;
      max-width: 720px;
      margin: 60px auto;
      line-height: 1.7;
      padding: 40px;
      border: 1px solid #222;
      border-radius: 10px;
    }

    header {
      margin-bottom: 50px;
      padding-bottom: 30px;
      border-bottom: 1px solid #222;
    }

    img.logo {
      width: 240px;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 12px rgba(255,255,255,0.25));
    }

    h1 {
      font-size: 1.8rem;
      margin: 0;
      color: #fff;
      letter-spacing: 0.6px;
    }

    p {
      color: #c0c0c0;
      margin: 0 auto 20px;
      max-width: 520px;
    }

    h2 {
      margin-top: 40px;
      color: #fff;
      font-size: 1.2rem;
      letter-spacing: 0.3px;
    }

    a {
      color: #66aaff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 60px;
      padding-top: 30px;
      border-top: 1px solid #222;
      font-size: 0.85rem;
      color: #777;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <header>
    <img class="logo" src="Foundation.jpg" alt="ACE Foundation logo">
    <h1>ACE Foundation</h1>
    <p>Applied Clarity & Evidence — a framework for transparent, reproducible and institutionally robust governance.</p>
  </header>

  <section>
    <h2>Contact</h2>
    <p>Email: <a href="mailto:info@acefoundation.net">info@acefoundation.net</a></p>

    <h2>GitHub</h2>
    <p><a href="https://github.com/ACE-Foundation">github.com/ACE-Foundation</a></p>
  </section>

  <footer style="margin-top:60px; color:#777; font-size:0.85rem;">
  ACE Foundation — Ontology • Methodology • Governance
  </footer>


</body>
</html>
