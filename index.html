<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ACE Foundation</title>
  <style>
    body {
      background: #000000;
      color: #e6e6e6;
      font-family: sans-serif;
      max-width: 600px;
      margin: 80px auto;
      line-height: 1.6;
      text-align: center;
    }

    img.logo {
      width: 260px;
      margin-bottom: 40px;
      filter: drop-shadow(0 0 14px rgba(255,255,255,0.35));
    }

    h1 {
      font-size: 2rem;
      margin-top: 0;
      color: #ffffff;
      letter-spacing: 0.5px;
    }

    p {
      color: #cccccc;
    }

    h2 {
      margin-top: 40px;
      color: #ffffff;
      font-size: 1.2rem;
      letter-spacing: 0.3px;
    }

    a {
      color: #66aaff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .divider {
      width: 60%;
      height: 1px;
      background: linear-gradient(to right, transparent, #333, transparent);
      margin: 40px auto;
    }
  </style>
</head>
<body>

  <!-- Din GROK-logga -->
  <img class="logo" src="Foundation.jpg" alt="ACE Foundation logo">

  <h1>ACE Foundation</h1>
  <p>Applied Clarity & Evidence — a framework for transparent, reproducible and institutionally robust governance.</p>

  <h2>Contact</h2>
  <p>Email: <a href="mailto:info@acefoundation.net">info@acefoundation.net</a></p>

  <h2>GitHub</h2>
  <p><a href="https://github.com/ACE-Foundation">github.com/ACE-Foundation</a></p>

</body>
</html>
