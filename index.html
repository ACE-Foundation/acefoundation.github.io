<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ACE Foundation</title>
  <style>
    body {
      background: #000;
      color: #d0d0d0;
      font-family: sans-serif;
      max-width: 900px;
      margin: 60px auto;
      line-height: 1.7;
      padding: 40px;
      border: 1px solid #222;
      border-radius: 10px;
    }

    /* Header layout: logga + text i rad */
    .header {
      display: flex;
      align-items: center;
      gap: 30px;
      border-bottom: 1px solid #222;
      padding-bottom: 30px;
      margin-bottom: 40px;
    }

    img.logo {
      width: 180px;
      filter: drop-shadow(0 0 12px rgba(255,255,255,0.25));
    }

    .title-block h1 {
      margin: 0;
      font-size: 1.8rem;
      color: #fff;
      letter-spacing: 0.6px;
      text-align: left;
    }

    .title-block p {
      margin: 8px 0 0;
      max-width: 500px;
      color: #c0c0c0;
      text-align: left;
    }

    h2 {
      margin-top: 40px;
      color: #fff;
      font-size: 1.2rem;
      letter-spacing: 0.3px;
    }

    a {
      color: #66aaff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 60px;
      padding-top: 30px;
      border-top: 1px solid #222;
      font-size: 0.85rem;
      color: #777;
      letter-spacing: 0.5px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="header">
    <img class="logo" src="Foundation.jpg" alt="ACE Foundation logo">

    <div class="title-block">
      <h1>ACE Foundation</h1>
      <p>Applied Clarity & Evidence — a framework for transparent, reproducible and institutionally robust governance.</p>
    </div>
  </div>

  <h2>Contact</h2>
  <p>Email: <a href="mailto:info@acefoundation.net">info@acefoundation.net</a></p>

  <h2>GitHub</h2>
  <p><a href="https://github.com/ACE-Foundation">github.com/ACE-Foundation</a></p>

  <footer>
    ACE Foundation — Ontology • Methodology • Governance
  </footer>

</body>
</html>
